name: Build
on:
  push:
    branches:
      - main
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.22
      - name: Download geosite.dat
        run: |
          mkdir -p assets
          curl -L "https://github.com/rootmelo92118/v2ray-rules-dat/releases/latest/download/geosite.dat" -o assets/geosite.dat
          ls -lh assets/geosite.dat
      - name: Build geosite
        id: build
        env:
          LOCAL_GEOSITE_PATH: assets/geosite.dat
          NO_SKIP: true
        run: |
          go run -v .
